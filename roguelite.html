<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Gwent Electron — Roguelite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="stylesheet" href="css/roguelite.css" />
    <!-- React + Babel via CDN (development build is fine for this prototype) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      /* The letterbox host / stage scaling system */
      .stage-host {
        position: fixed; inset: 0;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stage-wrap { position: relative; }
      .stage {
        position: relative;
        width: 1920px; height: 1080px;
        transform-origin: top left;
        background: #0a0a0a;
        overflow: hidden;
      }
      #root { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div class="stage-host">
      <div class="stage-wrap" id="stage-wrap">
        <div class="stage accent-gold" id="stage">
          <div id="root"></div>
        </div>
      </div>
    </div>

    <!-- Music toggle button (outside the React stage so it's always available) -->
    <button id="rl-music-toggle" title="Toggle music">♫</button>

    <!-- Letterbox scaling: keep 1920×1080 stage centred and scaled to fit the viewport -->
    <script>
      (function () {
        var W = 1920, H = 1080;
        function scale() {
          var vw = window.innerWidth, vh = window.innerHeight;
          var ratio = Math.min(vw / W, vh / H);
          var stage = document.getElementById('stage');
          var wrap  = document.getElementById('stage-wrap');
          if (!stage || !wrap) return;
          stage.style.transform = 'scale(' + ratio + ')';
          wrap.style.width  = Math.round(W * ratio) + 'px';
          wrap.style.height = Math.round(H * ratio) + 'px';
        }
        window.addEventListener('resize', scale);
        scale();
      })();
    </script>

    <!-- Roguelite data (plain JS — no JSX, no React) -->
    <script src="javascript/roguelite/data.js"></script>

    <!-- Music & UI sound system -->
    <script>
      (function () {
        var rlMusic = null;
        var rlMusicEnabled = true;
        var rlLastSfx = '';

        var MUSIC_TRACKS = [
          '001.mp3','002.mp3','005.mp3','008.mp3','011.mp3','022.mp3','026.mp3',
          '027.mp3','037.mp3','039.mp3','040.mp3','042.mp3','044.mp3','046.mp3','062.mp3','067.mp3'
        ];
        var rlCurrentTrack = null;
        var SFX_VOLUME = 0.35;
        var MUSIC_VOLUME = 0.6;

        function pickRandomTrack(exclude) {
          var choices = MUSIC_TRACKS.length > 1 ? MUSIC_TRACKS.filter(function(t) { return t !== exclude; }) : MUSIC_TRACKS;
          return choices[Math.floor(Math.random() * choices.length)];
        }

        function resolveTrackPaths(filename) {
          var paths = ['music/' + filename, './music/' + filename, '../music/' + filename];
          try {
            if (window.electronAPI && window.electronAPI.getResourcePath) {
              paths.unshift(window.electronAPI.getResourcePath('music/' + filename));
            }
          } catch (e) {}
          return paths;
        }

        function tryLoadMusic(paths, idx) {
          if (idx >= paths.length) {
            // All paths failed — move to next random track
            var next = pickRandomTrack(rlCurrentTrack);
            rlCurrentTrack = next;
            tryLoadMusic(resolveTrackPaths(next), 0);
            return;
          }
          var audio = new Audio(paths[idx]);
          audio.loop = false;
          audio.volume = MUSIC_VOLUME;
          audio.addEventListener('error', function () { tryLoadMusic(paths, idx + 1); });
          audio.addEventListener('ended', function () {
            var next = pickRandomTrack(rlCurrentTrack);
            rlCurrentTrack = next;
            tryLoadMusic(resolveTrackPaths(next), 0);
          });
          audio.addEventListener('canplaythrough', function () {
            if (rlMusicEnabled) audio.play().catch(function () {});
          });
          rlMusic = audio;
          if (rlMusicEnabled) audio.play().catch(function () {});
        }

        function initMusic() {
          // Check if the previous page asked us to keep music on.
          var stored = sessionStorage.getItem('musicEnabled');
          if (stored === 'false') { rlMusicEnabled = false; }

          var track = pickRandomTrack(null);
          rlCurrentTrack = track;
          tryLoadMusic(resolveTrackPaths(track), 0);

          var btn = document.getElementById('rl-music-toggle');
          if (btn) {
            if (!rlMusicEnabled) btn.classList.add('muted');
            btn.addEventListener('click', function () {
              rlMusicEnabled = !rlMusicEnabled;
              sessionStorage.setItem('musicEnabled', rlMusicEnabled ? 'true' : 'false');
              if (rlMusic) {
                if (rlMusicEnabled) { rlMusic.play().catch(function () {}); btn.classList.remove('muted'); }
                else { rlMusic.pause(); btn.classList.add('muted'); }
              }
            });
          }
        }

        // Expose a global SFX helper so React components can use it.
        window.rlTocar = function (name) {
          if (name === rlLastSfx) return;
          try {
            var src = 'sfx/' + name + '.mp3';
            try {
              if (window.electronAPI && window.electronAPI.getResourcePath) {
                src = window.electronAPI.getResourcePath(src);
              }
            } catch (e) {}
            var s = new Audio(src);
            s.volume = SFX_VOLUME;
            s.play().catch(function () {});
            rlLastSfx = name;
            setTimeout(function () { rlLastSfx = ''; }, 60);
          } catch (e) {}
        };

        // Start after first user gesture (needed for autoplay policy).
        var started = false;
        function onFirstInteraction() {
          if (started) return;
          started = true;
          initMusic();
          document.removeEventListener('click', onFirstInteraction);
          document.removeEventListener('keydown', onFirstInteraction);
        }
        document.addEventListener('click', onFirstInteraction);
        document.addEventListener('keydown', onFirstInteraction);

        // If music was already enabled from a previous page, start immediately on load.
        window.addEventListener('load', function () {
          if (sessionStorage.getItem('musicEnabled') === 'true') {
            started = true;
            initMusic();
          }
        });

        // Save music position before navigating away so it can resume on the next page
        window.addEventListener('beforeunload', function () {
          if (rlMusic && !rlMusic.paused) {
            sessionStorage.setItem('musicCurrentTime', rlMusic.currentTime);
          }
        });
      })();
    </script>

    <!-- Roguelite components (JSX — transpiled by Babel standalone) -->
    <script type="text/babel" data-type="module" src="javascript/roguelite/tweaks-panel.jsx"></script>
    <script type="text/babel" data-type="module" src="javascript/roguelite/components-menu.jsx"></script>
    <script type="text/babel" data-type="module" src="javascript/roguelite/components-map.jsx"></script>
    <script type="text/babel" data-type="module" src="javascript/roguelite/components-shop.jsx"></script>
    <script type="text/babel" data-type="module" src="javascript/roguelite/components-extras.jsx"></script>
    <script type="text/babel" data-type="module" src="javascript/roguelite/app.jsx"></script>
  </body>
</html>
